name: Docker Image CI

on:
  workflow_dispatch:
    - dev
    - main
    - feat/*
    

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file docker/willowcms/Dockerfile --tag robjects/whatismyadapter_cms:$(date +%s)
